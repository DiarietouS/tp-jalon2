databaseChangeLog:
  # Migration 01 : Création de la table restaurant

  - changeSet:
      id: 01-create-restaurant-table
      author: inf1013
      comment: Création de la table restaurant

      changes:
        - createTable:
            tableName: restaurant
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nom
                  type: VARCHAR(200)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: adresse
                  type: VARCHAR(500)
                  constraints:
                    nullable: false

              - column:
                  name: localisation_texte
                  type: VARCHAR(255)

              - column:
                  name: telephone
                  type: VARCHAR(20)

              - column:
                  name: courriel
                  type: VARCHAR(255)

              - column:
                  name: image_url
                  type: VARCHAR(1000)

              - column:
                  name: type_cuisine
                  type: VARCHAR(100)

              - column:
                  name: note
                  type: DECIMAL(3,1)
                  defaultValueNumeric: 0

              - column:
                  name: temps_livraison
                  type: VARCHAR(20)

              - column:
                  name: frais_livraison
                  type: DECIMAL(10,2)
                  defaultValueNumeric: 0

              - column:
                  name: commande_minimum
                  type: DECIMAL(10,2)
                  defaultValueNumeric: 0

              - column:
                  name: id_proprietaire
                  type: BIGINT

      rollback:
        - dropTable:
            tableName: restaurant
