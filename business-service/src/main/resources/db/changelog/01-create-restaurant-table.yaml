databaseChangeLog:
  - changeSet:
      id: 01-create-restaurant-table
      author: restaurantsapp
      changes:
        - createTable:
            tableName: restaurant
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nom
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: adresse
                  type: VARCHAR(500)
              - column:
                  name: telephone
                  type: VARCHAR(20)
              - column:
                  name: type_cuisine
                  type: VARCHAR(100)
              - column:
                  name: frais_livraison
                  type: DECIMAL(10,2)
              - column:
                  name: commande_minimum
                  type: DECIMAL(10,2)
