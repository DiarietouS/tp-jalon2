databaseChangeLog:
  # Migration 03 : Création de la table commande

  - changeSet:
      id: 03-create-commande-table
      author: inf1013
      comment: Création de la table commande avec statuts

      changes:
        - createTable:
            tableName: commande
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              # Référence au client dans auth-service
              - column:
                  name: id_client
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: id_restaurant
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: nom_restaurant
                  type: VARCHAR(200)

              # Statuts : EN_ATTENTE, CONFIRMEE, EN_PREPARATION, PRETE, EN_LIVRAISON, LIVREE, ANNULEE
              - column:
                  name: statut
                  type: VARCHAR(20)
                  defaultValue: "EN_ATTENTE"
                  constraints:
                    nullable: false

              - column:
                  name: sous_total
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: frais_livraison
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: total
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: adresse_livraison
                  type: VARCHAR(500)

              - column:
                  name: telephone
                  type: VARCHAR(20)

              - column:
                  name: cree_le
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false

              - column:
                  name: livraison_estimee
                  type: TIMESTAMP

      rollback:
        - dropTable:
            tableName: commande
