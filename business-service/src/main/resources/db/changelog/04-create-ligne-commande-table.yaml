databaseChangeLog:
  # Migration 04 : Création de la table ligne_commande

  - changeSet:
      id: 04-create-ligne-commande-table
      author: inf1013
      comment: Création de la table ligne_commande (détails de chaque commande)

      changes:
        - createTable:
            tableName: ligne_commande
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              # Clé étrangère vers la table commande
              - column:
                  name: id_commande
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ligne_commande
                    references: commande(id)

              - column:
                  name: id_plat
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: nom_plat
                  type: VARCHAR(200)
                  constraints:
                    nullable: false

              - column:
                  name: quantite
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: prix_unitaire
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

      rollback:
        - dropTable:
            tableName: ligne_commande
