databaseChangeLog:
  - changeSet:
      id: 04-create-ligne-commande-table
      author: restaurantsapp
      changes:
        - createTable:
            tableName: ligne_commande
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: quantite
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: prix_unitaire
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: sous_total
                  type: DECIMAL(10,2)
              - column:
                  name: commande_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ligne_commande_commande
                    references: commande(id)
              - column:
                  name: plat_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ligne_commande_plat
                    references: plat(id)
        - createTable:
            tableName: livraison
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: commande_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_livraison_commande
                    references: commande(id)
              - column:
                  name: courriel_livreur
                  type: VARCHAR(255)
              - column:
                  name: statut
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: date_assignation
                  type: TIMESTAMP
              - column:
                  name: date_livraison
                  type: TIMESTAMP
              - column:
                  name: notes
                  type: TEXT
