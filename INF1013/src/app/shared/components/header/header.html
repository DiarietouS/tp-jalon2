<!-- Header Angular Material (toolbar + recherche) -->

<mat-toolbar color="primary" class="app-toolbar">
  <div class="toolbar-left">
    <div class="location">
      <div class="location-label">Votre destination</div>
      <div class="location-value">
        <span class="address">{{ adresseLivraison() }}</span>
        <mat-icon class="chevron">keyboard_arrow_down</mat-icon>
      </div>
    </div>
  </div>

  <span class="spacer"></span>

  <button mat-icon-button routerLink="/profil" aria-label="Profil" class="notif-btn">
    <mat-icon>person</mat-icon>
  </button>
</mat-toolbar>

<div class="search-bar">
  <mat-form-field appearance="outline" class="search-field">
    <mat-icon matPrefix>search</mat-icon>
    <input
      matInput
      #searchInput
      type="text"
      placeholder="Rechercher une saveur, un lieu..."
      [value]="texteRecherche()" />
  </mat-form-field>
</div>
