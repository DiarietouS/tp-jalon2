databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: tp-jalon1
      changes:
        - createTable:
            tableName: utilisateurs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: prenom
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: nom
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: courriel
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: mot_de_passe
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: telephone
                  type: VARCHAR(20)
              - column:
                  name: adresse
                  type: VARCHAR(500)
              - column:
                  name: role
                  type: VARCHAR(50)
                  defaultValue: client
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: utilisateurs
